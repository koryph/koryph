#
# GoReleaser config (v2, >=2.16 for immutable releases). Snapshot-first:
# `make release-snapshot` builds and archives locally with NO publishing.
# Real releases are cut by merging a release-please Release PR; the
# `tag-and-build` job in .github/workflows/release-please.yml then tags
# v<Engine> and runs GoReleaser at that tag. GoReleaser now OWNS the GitHub
# release itself (release-please-config.json sets skip-github-release:
# true) and creates it as a DRAFT (release.draft: true below) so every
# asset — binaries, checksums, cosign bundle, SBOMs — uploads before
# anything is published; a separate `publish` job attaches SLSA provenance
# and then flips the release to published as the pipeline's last step
# (immutable releases lock the asset set at publication, not before). See
# docs/developer-guide/releasing.md (koryph-q35.5).
version: 2

project_name: koryph

before:
  hooks:
    - go mod download
    # Fail fast if the engine version const drifts from the release tag.
    - sh -c 'test -z "$GORELEASER_CURRENT_TAG" || test "$GORELEASER_CURRENT_TAG" = "v$(go run ./cmd/koryph version | awk "{print \$NF}")" || { echo "internal/version.Engine != tag $GORELEASER_CURRENT_TAG"; exit 1; }'

builds:
  - id: koryph
    main: ./cmd/koryph
    binary: koryph
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # Stamp git provenance into internal/version (parity with the Makefile's
    # LDFLAGS). .Summary is `git describe --tags --dirty --always`; on a real
    # tagged release it is the exact tag, e.g. v0.8.0. Engine (the semver const)
    # is intentionally left untouched — release-please keeps it aligned with the
    # tag and the before-hook above verifies it.
    ldflags:
      - -s -w
      - -X github.com/koryph/koryph/internal/version.describe={{ .Summary }}
      - -X github.com/koryph/koryph/internal/version.commit={{ .ShortCommit }}
      - -X github.com/koryph/koryph/internal/version.date={{ .CommitDate }}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: koryph
    formats: [tar.gz]
    name_template: "koryph_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

# cosign keyless (sigstore) signing of the checksum manifest. The workflow's
# GitHub OIDC identity is the certificate subject (Fulcio), recorded in the
# Rekor transparency log — no signing key exists anywhere. `--bundle` merges
# certificate + signature into one `.sigstore.json` file (replaces the older
# separate `.sig`/`.pem` pair).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes
    artifacts: checksum
    output: true

# One SPDX SBOM per archive, generated by syft (must be on PATH in CI — see
# the release-please.yml goreleaser job).
sboms:
  - id: archive
    artifacts: archive
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
    documents:
      - "${artifact}.sbom.spdx.json"

# Release-notes groups by Conventional Commit type (mirrors the accepted
# types in docs/developer-guide/releasing.md). Only meaningful when
# GoReleaser itself writes release notes (e.g. `make release-snapshot`); in
# the real chained release, release.mode below keeps release-please's notes.
changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 4
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^test(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^style(\(.+\))?:'
      - '^build(\(.+\))?:'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

# Homebrew cask published to koryph/homebrew-tap on every real release.
# Publishing is skipped (gracefully, without failing the release) when
# HOMEBREW_TAP_GITHUB_TOKEN is absent — see the guard in skip_upload below.
# CI wires the token via a GitHub App (actions/create-github-app-token,
# owner=koryph, repositories=homebrew-tap) or falls back to
# secrets.HOMEBREW_TAP_TOKEN; see the operator note in SUMMARY.md for the
# exact ready-to-paste step YAML.
#
# macOS quarantine: binaries built with CGO_ENABLED=0 and signed via cosign
# (keyless OIDC) are not Apple-notarised, so Gatekeeper quarantines them on
# first launch. The post_install hook removes the com.apple.quarantine xattr
# so `koryph` runs immediately after `brew install` without a security prompt.
homebrew_casks:
  - name: koryph
    repository:
      owner: koryph
      name: homebrew-tap
      # Token for pushing the cask to the (sibling) tap repo. Must use the
      # `.Env.KEY` template var, NOT the `env "KEY"` FUNCTION: the function is
      # not defined in this field's template context and errors with
      # `function "env" not defined` the moment the field is actually
      # evaluated — which only happens on a real publish (token present →
      # skip_upload != true). That is exactly what broke the v0.10.0 release;
      # the earlier releases never hit it because an empty token made
      # skip_upload short-circuit before this field was rendered.
      # `.Env.KEY` panics only if KEY is wholly ABSENT from the environment;
      # the release workflow always exports HOMEBREW_TAP_GITHUB_TOKEN (empty
      # or not), and when it is empty skip_upload is true so this field is
      # never rendered — so no panic in any path.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update koryph cask to {{ .Tag }}"
    homepage: "https://github.com/koryph/koryph"
    description: "Autonomous AI coding-wave orchestrator"
    license: "Apache-2.0"
    # Guard: skip (not fail) when HOMEBREW_TAP_GITHUB_TOKEN is empty/absent.
    # When the token is present, "auto" still skips pre-releases and snapshots.
    # `index .Env "KEY"` returns "" for an unset key in every template context
    # (unlike the `env` FUNCTION, which is not defined here, and unlike
    # `.Env.KEY`, which panics on a wholly-absent key). Keep this expression
    # as the single guard that decides whether the token field above is ever
    # rendered.
    skip_upload: '{{ if eq (index .Env "HOMEBREW_TAP_GITHUB_TOKEN") "" }}true{{ else }}auto{{ end }}'
    # Shell completions: calls `koryph completion bash` / `koryph completion zsh`
    # at install time and writes the output to Homebrew's completion dirs.
    generate_completions_from_executable:
      executable: koryph
      args: ["completion"]
      shells: [bash, zsh]
    hooks:
      post:
        # Quarantine removal: unsigned macOS binaries are quarantined by
        # Gatekeeper on first launch. Removing the xattr here means
        # `koryph` works immediately after `brew install`.
        install: |
          system_command "/usr/bin/xattr",
            args: ["-dr", "com.apple.quarantine", staged_path],
            sudo: false

release:
  github:
    owner: koryph
    name: koryph
  prerelease: auto
  # GoReleaser now creates the GitHub release itself (release-please no
  # longer does — skip-github-release: true) and holds it as a draft until
  # every asset has uploaded; the workflow's `publish` job flips this to
  # published only after SLSA provenance has also been attached. GoReleaser's
  # own changelog (grouped by Conventional Commit type, see `changelog:`
  # above) becomes the release body, since there is no pre-existing release
  # to keep notes from (mode: keep-existing is therefore dropped: its default
  # only matters when a release already exists for the tag, which is never
  # true here).
  draft: true
