#
# GoReleaser config (v2, >=2.16 for immutable releases). Snapshot-first:
# `make release-snapshot` builds and archives locally with NO publishing.
# Real releases are cut by merging a release-please Release PR, which tags
# v<Engine> and creates the GitHub release; GoReleaser then runs in the same
# workflow run (.github/workflows/release-please.yml) checked out at that
# tag, and attaches build artifacts to the release release-please already
# created (release.mode: keep-existing preserves its changelog notes).
version: 2

project_name: koryph

before:
  hooks:
    - go mod download
    # Fail fast if the engine version const drifts from the release tag.
    - sh -c 'test -z "$GORELEASER_CURRENT_TAG" || test "$GORELEASER_CURRENT_TAG" = "v$(go run ./cmd/koryph version | awk "{print \$NF}")" || { echo "internal/version.Engine != tag $GORELEASER_CURRENT_TAG"; exit 1; }'

builds:
  - id: koryph
    main: ./cmd/koryph
    binary: koryph
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: koryph
    formats: [tar.gz]
    name_template: "koryph_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

# cosign keyless (sigstore) signing of the checksum manifest. The workflow's
# GitHub OIDC identity is the certificate subject (Fulcio), recorded in the
# Rekor transparency log — no signing key exists anywhere. `--bundle` merges
# certificate + signature into one `.sigstore.json` file (replaces the older
# separate `.sig`/`.pem` pair).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes
    artifacts: checksum
    output: true

# One SPDX SBOM per archive, generated by syft (must be on PATH in CI — see
# the release-please.yml goreleaser job).
sboms:
  - id: archive
    artifacts: archive
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
    documents:
      - "${artifact}.sbom.spdx.json"

# Release-notes groups by Conventional Commit type (mirrors the accepted
# types in docs/developer-guide/releasing.md). Only meaningful when
# GoReleaser itself writes release notes (e.g. `make release-snapshot`); in
# the real chained release, release.mode below keeps release-please's notes.
changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 4
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^test(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^style(\(.+\))?:'
      - '^build(\(.+\))?:'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

release:
  github:
    owner: koryph
    name: koryph
  prerelease: auto
  # release-please already created the GitHub release for this tag (with its
  # own conventional-commit changelog); GoReleaser attaches build artifacts
  # to that same release rather than fighting over the notes.
  mode: keep-existing
