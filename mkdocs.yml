site_name: koryph
site_description: Multi-project orchestrator for autonomous AI coding agents
site_url: https://koryph.build/
repo_url: https://github.com/koryph/koryph
# Internal roadmap/design docs stay in-repo (referenced by CLAUDE.md and the
# epics) but are excluded from the published book. llms.txt is a static asset
# copied verbatim to the site root for AI-agent discovery.
# NOTE: the site builds with zensical, which does not implement exclude_docs
# yet (accepted into their backlog — zensical/zensical#135); until it ships,
# CI enforces the exclusion by removing docs/designs before the build (see
# .github/workflows/docs.yml). The key stays for intent + forward compat.
exclude_docs: |
  designs/
# NAV COUPLING: zensical has no auto-nav mechanism for explicit `nav:` blocks.
# Every new page requires a manual edit here. Auto-dir-nav plugins (awesome-nav,
# literate-nav, include-dir-to-nav) are tracked upstream but not yet shipped:
#   zensical/backlog#12  — mkdocs-awesome-nav support
#   zensical/backlog#13  — mkdocs-literate-nav support
#   zensical/backlog#106 — mkdocs-include-dir-to-nav support
#   (all children of the "Modular navigation" proposal: zensical/backlog#43)
# Mitigation for parallel docs work: any bead that adds a new page carries the
# write token fp:docs-nav alongside area:docs so only nav-editing beads serialize
# while content-only edits remain parallel (see koryph-plan skill, step 3).
theme:
  name: material
  features:
    - navigation.tabs
markdown_extensions:
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Features: features.md
  - Concepts:
      - Overview: concepts/index.md
      - "The lifecycle: from prompt to release": concepts/lifecycle.md
      - "Work: beads and the ready-graph": concepts/beads.md
      - "Parallelism: footprints": concepts/footprints.md
      - "Machine: resources": concepts/resources.md
      - "Time: rolling dispatch": concepts/rolling-dispatch.md
      - "Safety: worktrees and the green gate": concepts/worktrees.md
      - "Money: governors and quota": concepts/governors.md
      - "People: accounts and personas": concepts/accounts.md
      - "Hygiene: postures and vaults": concepts/postures.md
      - "Shipping: the release train": concepts/release-train.md
      - "The fence: ejectability": concepts/ejectability.md
  - User guide:
      - Getting started:
