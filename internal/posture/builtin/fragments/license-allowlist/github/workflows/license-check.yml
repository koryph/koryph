#
# license-check — dependency license allowlist CI job (managed by koryph posture; do not edit manually).
# Installed by: koryph posture apply <profile> (fragment: license-allowlist)
# To update: re-run koryph posture apply or koryph doctor --project --fix --force
#
# Allowed licenses are listed in scripts/allowed-licenses.txt (one SPDX id per line).
name: license-check
on:
  push:
    branches: [main]
  pull_request:
jobs:
  license-check:
    name: dependency license allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: check dependency licenses
        run: |
          ALLOWED=$(paste -sd, scripts/allowed-licenses.txt)
          go-licenses check ./... --allowed_licenses="${ALLOWED}"
