# gitleaks — secret scanning CI job (managed by koryph posture; do not edit manually).
# Installed by: koryph posture apply <profile> (fragment: gitleaks)
# To update: re-run koryph posture apply or koryph doctor --project --fix --force
name: gitleaks
on:
  push:
  pull_request:
jobs:
  gitleaks:
    name: detect secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
