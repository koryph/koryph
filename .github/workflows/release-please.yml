# (koryph-0vf.3) koryph's own caller into the reusable release-train.yml
# workflow (extracted from the koryph-q35.5-validated draft-until-complete
# pipeline; see docs/developer-guide/releasing.md and
# docs/designs/2026-07-release-train.md). This file keeps its historical
# name (release-please.yml) rather than renaming to release.yml: the
# workflow's filename is part of the SLSA provenance configSource
# entryPoint and the cosign certificate SAN for every release signed
# before this extraction (confirmed against the real v0.5.0 release
# artifacts: SAN "https://github.com/koryph/koryph/.github/workflows/
# release-please.yml@refs/heads/main") — renaming it would silently change
# the expected verification identity for consumers of past releases.
#
# INPUT LOCKSTEP: the `with:` keys below (release_type, extra_files,
# artifacts_dir, build_mode, goreleaser_version, sbom, provenance,
# go_version, gate_command) must match release-train.yml's `on.
# workflow_call.inputs` names exactly. Update both sides together.
#
# Uses the SAME-REPOSITORY local path form (`./.github/workflows/
# release-train.yml`, no `@{ref}`) rather than `koryph/koryph/...@main`:
# per GitHub's reusing-workflows docs, this form runs the callee from the
# caller's own commit, which is what koryph (the origin of release-train.
# yml) wants — no risk of a caller commit racing an unpublished change to
# the reusable workflow on `main`. Consumer projects outside this repo use
# the `koryph/koryph/.github/workflows/release-train.yml@main` form
# instead (see internal/release/caller-workflow.yml.tmpl).
name: release-please
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  release:
    name: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/release-train.yml
    with:
      release_type: "go"
      extra_files: "internal/version/version.go"
      artifacts_dir: "dist"
      build_mode: "goreleaser"
      goreleaser_version: "~> v2.16"
      sbom: true
      provenance: true
      go_version: "1.26"
      gate_command: "make version-check TAG=$RELEASE_TAG && make gate"
    secrets: inherit
