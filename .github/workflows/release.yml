#
# Signed releases: on every v* tag, build multi-platform binaries and sign
# the checksum manifest KEYLESSLY with sigstore cosign — the workflow's own
# GitHub OIDC identity is the certificate subject (Fulcio), logged in the
# Rekor transparency ledger. No signing key exists anywhere.
name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  id-token: write # sigstore keyless OIDC
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - name: Verify engine version matches the tag
        run: make version-check TAG="$GITHUB_REF_NAME"
      - name: Green gate
        run: make gate
      - name: Build multi-platform binaries
        run: |
          set -eu
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              out="koryph_${GITHUB_REF_NAME}_${os}_${arch}"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
                go build -trimpath -ldflags "-s -w" -o "dist/$out/koryph" ./cmd/koryph
              tar -C "dist/$out" -czf "dist/$out.tar.gz" koryph
              rm -r "dist/$out"
            done
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Keyless-sign the checksum manifest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "koryph $GITHUB_REF_NAME" --generate-notes
