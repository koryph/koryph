name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run pre-commit on all files
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --all-files --hook-stage pre-commit
      - name: Enforce conventional commits + DCO on PR commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          base="$BASE_SHA"
          head="$HEAD_SHA"
          bad=0
          # --no-merges: merge commits are minted server-side (the Update
          # branch button, GitHub web merges) so they never pass through
          # local hooks, cannot carry a DCO sign-off, and are discarded by
          # this repo's squash-only merge policy anyway.
          for c in $(git rev-list --no-merges "$base..$head"); do
            # Bot commits (dependabot) are trusted and cannot DCO sign-off.
            [ "$(git log -1 --format='%an' "$c")" = "dependabot[bot]" ] && continue
            msg=$(git log -1 --format=%B "$c")
            echo "$msg" | head -1 | grep -qE '^(feat|fix|docs|chore|refactor|test|ci|build|perf|style)(\([a-z0-9./-]+\))?(!)?: .+' \
              || { echo "::error::$c: subject is not Conventional Commits"; bad=1; }
            echo "$msg" | grep -qE '^Signed-off-by: .+ <.+@.+>' \
              || { echo "::error::$c: missing DCO sign-off (git commit -s)"; bad=1; }
          done
          exit $bad
  gate:
    name: green gate (make gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: make gate
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: make lint-ci
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: make vuln
  vscode-ext:
    name: VS Code extension (make ext-build ext-test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check for extension-relevant changes
        id: filter
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
            echo "$changed" | grep -qE '^(ide/vscode/|Makefile$)' \
              && echo "match=true" >> "$GITHUB_OUTPUT" || echo "match=false" >> "$GITHUB_OUTPUT"
          else
            # Non-PR events (push to main): always run — this is the merge gate.
            echo "match=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.filter.outputs.match == 'true'
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ide/vscode/package-lock.json
      - name: make ext-build ext-test
        if: steps.filter.outputs.match == 'true'
        run: make ext-build ext-test
      - name: skipped (no extension-relevant changes)
        if: steps.filter.outputs.match != 'true'
        run: echo "No changes under ide/vscode/ or Makefile — skipping extension build/test."
