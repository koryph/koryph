name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.26"
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Run pre-commit on all files
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --all-files --hook-stage pre-commit
      - name: Enforce conventional commits + DCO on PR commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          base="$BASE_SHA"
          head="$HEAD_SHA"
          bad=0
          for c in $(git rev-list "$base..$head"); do
            # Bot commits (dependabot) are trusted and cannot DCO sign-off.
            [ "$(git log -1 --format='%an' "$c")" = "dependabot[bot]" ] && continue
            msg=$(git log -1 --format=%B "$c")
            echo "$msg" | head -1 | grep -qE '^(feat|fix|docs|chore|refactor|test|ci|build|perf|style)(\([a-z0-9./-]+\))?(!)?: .+' \
              || { echo "::error::$c: subject is not Conventional Commits"; bad=1; }
            echo "$msg" | grep -qE '^Signed-off-by: .+ <.+@.+>' \
              || { echo "::error::$c: missing DCO sign-off (git commit -s)"; bad=1; }
          done
          exit $bad
  gate:
    name: green gate (make gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.26"
      - run: make gate
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.26"
      - run: make lint-ci
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542 # v5.0.0
  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.26"
      - run: make vuln
