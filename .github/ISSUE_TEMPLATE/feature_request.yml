name: Feature request
description: Propose an improvement
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
